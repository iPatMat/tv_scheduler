name: Daily Bar TV Schedule

on:
  schedule:
    - cron: '0 11 * * *'   # Runs at 7am Central Time (noon UTC)
  workflow_dispatch:         # Also lets you run it manually anytime

jobs:
  send-schedule:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Required for peaceiris/actions-gh-pages to push

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scheduler
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python tv_schedule.py

      - name: Generate HTML
        run: |
          mkdir -p public
          python generate_html.py schedule.json public/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
